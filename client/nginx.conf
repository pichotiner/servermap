server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API and tile requests to backend
    location ~ ^/(api|tiles|up)/ {
        proxy_pass http://backend:3001;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1m;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
